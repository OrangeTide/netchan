name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# A new push supersedes the one before it on the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned so a CI failure means the code changed, not the toolchain.
  OW_RELEASE: 2026-07-13-Build

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        cc: [gcc, clang]
        exclude:
          # gcc on the macOS runners is a clang shim, so it tests nothing new
          - os: macos-latest
            cc: gcc
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: make -j"$(getconf _NPROCESSORS_ONLN)" CC=${{ matrix.cc }}

      # The quiet build sends the archiver's stderr to /dev/null, so a failing
      # ar arrives as a bare "Error 1". V=1 prints full command lines and lets
      # the tools speak. Serial, so the error lands next to its command.
      - name: Re-run verbosely on failure
        if: failure()
        run: make V=1 CC=${{ matrix.cc }}

      - name: Test
        run: make run-tests CC=${{ matrix.cc }}

  sanitizers:
    name: asan + ubsan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SAN_CFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer -g -O1
      SAN_LDFLAGS: -fsanitize=address,undefined
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          make -j"$(getconf _NPROCESSORS_ONLN)" \
            CFLAGS="$SAN_CFLAGS" LDFLAGS="$SAN_LDFLAGS"

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: make run-tests CFLAGS="$SAN_CFLAGS" LDFLAGS="$SAN_LDFLAGS"

  vendorable:
    name: cc-only core build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # The point of Makefile.simple: prove the core still builds and passes
      # with nothing but a compiler and an -I per directory.
      - name: Build and test the core alone
        run: make -f Makefile.simple check

  dos:
    name: microchan 16-bit DOS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      # The snapshot is ~150 MB, so it is worth not fetching every run. The
      # key is the pinned release tag: a new tag misses and re-downloads.
      - name: Cache Open Watcom
        id: ow-cache
        uses: actions/cache@v6
        with:
          path: ~/open-watcom
          key: open-watcom-${{ env.OW_RELEASE }}

      - name: Install Open Watcom
        if: steps.ow-cache.outputs.cache-hit != 'true'
        run: |
          url=https://github.com/open-watcom/open-watcom-v2/releases/download
          mkdir -p ~/open-watcom
          curl -fsSL "$url/$OW_RELEASE/ow-snapshot.tar.xz" \
            | tar -xJ -C ~/open-watcom

      # mc_ipx.c and plat_dos.c are real-mode 16-bit and never see a host
      # compiler, so this job is the only thing that checks them at all.
      - name: Build the DOS target
        working-directory: microchan
        run: |
          export WATCOM="$HOME/open-watcom"
          export PATH="$WATCOM/binl64:$PATH"
          wmake

      - name: Check the executables came out
        working-directory: microchan
        run: |
          ls -l _dos/mcdemo.exe _dos/ipxtest.exe _dos/thor.exe
          for f in _dos/*.exe; do
              file "$f" | grep -q 'MS-DOS executable' || {
                  echo "$f is not a DOS executable"; exit 1; }
          done

      # There is no way to run these here, so keep them for someone with a
      # DOSBox to hand.
      - uses: actions/upload-artifact@v6
        with:
          name: microchan-dos
          path: microchan/_dos/*.exe
          retention-days: 14

  wasm:
    name: wasm32
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16

      # Only the socketless layers compile here, which is the check that
      # matters: the core must not have quietly grown a dependency on a
      # socket, an allocator quirk, or a 64-bit assumption.
      - name: Build
        run: make -j"$(getconf _NPROCESSORS_ONLN)" CC=emcc CXX=em++
